tracking:
  debug: true                 # Enable console debug output
  save_log: true              # Save debug logs to disk
  fps: 30                     # Video FPS
  overlap_log_threshold: 0.001   # IoU threshold used only for debug/logging overlap state
    # If detection IoU with another detection >= this value,
    # it is marked as overlapping in logs/meta when overlap_mechanism is bbox_iou.
  overlap_mechanism: skeleton_capsule
  skeleton_overlap_threshold: 0.08
  skeleton_overlap_full_weight: 0.35
  skeleton_overlap_core_weight: 0.65
  skeleton_overlap_conf_threshold: 0.05
  skeleton_overlap_thickness: 7
  skeleton_overlap_relation_debug_mode: true

  adaptive_overlap_iou_near: 0.0000
    # IoU threshold when centers are very close.
  adaptive_overlap_iou_mid: 0.0001
    # IoU threshold when centers are medium-close.
  adaptive_overlap_iou_far: 0.08
    # IoU threshold when centers are far-but-still-relevant.
  adaptive_overlap_iou_default: 0.2
    # IoU threshold when centers are farther than adaptive_overlap_center_far.

  overlap_app_freeze_after: 5
    # Source-based cooldown length.
    # If Track M disappears immediately after overlap with Track N,
    # Track N freezes appearance until Track M matches again or this counter reaches 0.

  kalman:
    process_var: 1e6          # Process noise variance
                              # Higher -> less trust in prediction, faster adaptation
    measure_var: 5000         # Measurement noise variance
                              # Higher -> less trust in detections
    p0: 1000.0                # Initial covariance
                              # Higher -> more uncertainty for new tracks

  matching:
    alpha: 0.8                # Legacy / optional blending parameter
    chi2_gating: 9.21         # Chi-square gating threshold
                              # Lower -> stricter motion gate
    pose_scale_eps: 1.0e-6    # Small epsilon for pose-related normalization
    greedy_threshold: 4.1     # Max final cost accepted by greedy matcher
    max_update_cost: 1.2      # Max absolute raw weighted cost allowed for Track update
    max_update_motion: 0.08  # If d_motion is above this, skip Kalman/motion update
    max_update_pose: 0.25    # If d_pose is above this, skip pose memory update
    max_update_app: 0.06     # Strict direct EMA update threshold for current detection.
    # ----------------------------------------------------------------------
    # Appearance EMA recovery buffer
    # ----------------------------------------------------------------------
    app_buffer_upper: 0.12   # Base upper d_app limit for putting embeddings into recovery buffer.
    app_buffer_hard_upper: 0.18  # Maximum relaxed d_app limit; above this embeddings are never buffered.
    app_buffer_relax_tau: 8  # How fast app_buffer_upper relaxes toward hard_upper as app_stale_frames grows.
    app_buffer_min_size: 3   # Accepted recovery embeddings needed before batch EMA recovery update.
    app_buffer_max_motion: 0.08  # Required motion quality gate for recovery buffer entry.
    app_buffer_max_pose: 0.25    # Required pose quality gate for recovery buffer entry.
    app_buffer_min_coverage: 0.70  # Minimum appearance crop coverage required for buffer entry.
    app_buffer_recovery_ema_alpha: 0.97  # Old-EMA weight for recovery batch update; high value keeps it cautious.
    app_buffer_clear_on_overlap: true       # Clear recovery buffer when overlap-based reject occurs.
    app_buffer_clear_on_freeze: true        # Clear recovery buffer when freeze-based reject occurs.
    app_buffer_clear_on_hard_reject: true   # Clear recovery buffer when d_app exceeds hard upper threshold.
    app_buffer_clear_on_strict_update: true # Clear recovery buffer after successful strict appearance update.
    app_buffer_clear_on_safety_fail: true   # Clear recovery buffer when motion/pose/coverage safety gates fail.
    missing_app_penalty: 0.08 # Small cost penalty for missing/unknown appearance parts

    motion_threshold: 0.09    # Max allowed normalized motion distance
                              # Above this -> reject pair
    pose_threshold: 0.4       # Max allowed pose distance
                              # Above this -> reject pair
    appearance_threshold: 0.12 # Max allowed appearance distance
                              # Above this -> reject pair

    emb_ema_alpha: 0.90      # Weight of OLD appearance EMA.
                              # Higher -> slower update, more stable memory.
                              # Lower -> faster update, more aggressive replacement.
    bad_kp_patience: 50       # Frames to wait before updating from bad keypoints
    large_cost: 880.0         # Sentinel cost for invalid / gated pairs
    min_kp_conf: 0.05         # Minimum keypoint confidence

    w_motion: 3.0             # Weight of relative motion penalty
    w_pose: 1.0               # Weight of relative pose penalty
    w_app: 2.0                # Weight of relative appearance penalty

    k_motion: 3.0             # Relative saturation ratio for motion
                              # 3x worse than best -> near max penalty
    k_pose: 3.0               # Relative saturation ratio for pose
                              # 3x worse than best -> near max penalty
    k_app: 3.0                # Relative saturation ratio for appearance
                              # 3x worse than best -> near max penalty


    miss_relax_full_after: 20
    miss_relax_strength: 2.0

    min_core_kps: 7           # Minimum valid core keypoints for reliable pose matching

    pose_core:                # BODY_25 joints used for pose comparison
      - 1   # Neck
      - 2   # Right Shoulder
      - 3   # Right Elbow
      - 5   # Left Shoulder
      - 6   # Left Elbow
      - 8   # MidHip
      - 9   # Right Hip
      - 10  # Right Knee
      - 12  # Left Hip
      - 13  # Left Knee

    pose_center:              # BODY_25 joints used as centering roots (priority order)
      - 8   # MidHip
      - 1   # Neck
      - 9   # Right Hip
      - 12  # Left Hip
      - 2   # Right Shoulder
      - 5   # Left Shoulder

  tracker:
    max_age: 20                # Max missed frames for unconfirmed track
    max_confirmed_age: 75     # Max missed frames for confirmed track
    min_hits: 20              # Matches needed to confirm a track
    min_hits_sub: 4          # Matches needed for sub-confirmed adaptive overlap
    min_kp_conf: 0.009         # Minimum keypoint confidence for track update
    reset_g_threshold: 0.32   # If g < threshold -> activate reset mode
    max_unconfirmed_tracks: 6  # Max number of active unconfirmed tracks (confirmed tracks are never pruned)
    w_body: 1.0               # Weight of body appearance features in fused e_app
    w_left_glove: 0.25         # Weight of left glove features in fused e_app
    w_right_glove: 0.25        # Weight of right glove features in fused e_app
    w_shorts: 0.5           # Weight of shorts features in fused e_app

  graph_clustering:
    k: 9                      # Number of neighbors / graph connectivity parameter
    sim_threshold: 0.8        # Minimum similarity for linking nodes
    n_clusters: 3             # Number of output clusters
    random_state: 42          # Random seed for reproducibility
    assign_labels: kmeans     # Label assignment strategy
